<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyglot - 多语种在线教育平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  --bg-dark: #0f0f1a;
  --bg-card: rgba(255, 255, 255, 0.05);
  --border-color: rgba(255, 255, 255, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-gradient {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(240, 147, 251, 0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.glass-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
}

.btn-primary {
  background: var(--primary-gradient);
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 15px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.08);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 14px 32px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 15px;
}
.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.12);
}

input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: white;
  font-size: 15px;
  transition: all 0.3s ease;
}
input:focus {
  outline: none;
  border-color: rgba(102, 126, 234, 0.5);
  box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
}
input::placeholder { color: rgba(255, 255, 255, 0.4); }

#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(15, 15, 26, 0.8);
  backdrop-filter: blur(20px);
}
.logo {
  font-size: 24px;
  font-weight: 800;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-links {
  display: flex;
  gap: 30px;
}
.nav-links a {
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s;
}
.nav-links a:hover { color: white; }

#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 40px 40px;
  position: relative;
  z-index: 1;
}
.hero-content {
  max-width: 1200px;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.hero-text h1 {
  font-size: 56px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 24px;
}
.hero-text h1 span {
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-text p {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.6);
  line-height: 1.8;
  margin-bottom: 36px;
}
.language-badges {
  display: flex;
  gap: 12px;
  margin-bottom: 36px;
}
.lang-badge {
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.lang-badge.eng { background: rgba(66, 133, 244, 0.2); border-color: rgba(66, 133, 244, 0.4); }
.lang-badge.jpn { background: rgba(255, 152, 0, 0.2); border-color: rgba(255, 152, 0, 0.4); }
.lang-badge.kr { background: rgba(67, 160, 71, 0.2); border-color: rgba(67, 160, 71, 0.4); }

.auth-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
}
.auth-modal.show { display: flex; }
.auth-box {
  width: 420px;
  max-width: 90%;
  padding: 40px;
  background: rgba(20, 20, 35, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  position: relative;
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: white;
  cursor: pointer;
}
.close-btn:hover { background: rgba(255, 255, 255, 0.1); }
.auth-box h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.auth-box p {
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 32px;
}
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 8px;
}
.auth-box button {
  width: 100%;
  margin-top: 8px;
}
.auth-toggle {
  text-align: center;
  margin-top: 24px;
  color: rgba(255, 255, 255, 0.5);
  font-size: 14px;
}
.auth-toggle a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
}

.hero-features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 60px;
}
.feature-card {
  padding: 24px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 16px;
  text-align: center;
  transition: all 0.3s;
}
.feature-card:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(102, 126, 234, 0.3);
  transform: translateY(-4px);
}
.feature-card .icon {
  font-size: 32px;
  margin-bottom: 12px;
}
.feature-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
}
.feature-card p {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.5);
}

@media (max-width: 900px) {
  .hero-content { grid-template-columns: 1fr; text-align: center; }
  .hero-text h1 { font-size: 40px; }
  .language-badges { justify-content: center; }
  .hero-features { grid-template-columns: 1fr; }
  #header { padding: 15px 20px; }
  .nav-links { gap: 15px; }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>

<header id="header">
  <div class="logo">Polyglot</div>
  <nav class="nav-links">
    <a href="#features">功能介绍</a>
    <a href="#courses">课程体系</a>
    <a href="#community">社区</a>
    <button class="btn-secondary" onclick="showLogin()">登录</button>
    <button class="btn-primary" onclick="showRegister()">注册</button>
  </nav>
</header>

<section id="hero">
  <div class="hero-content">
    <div class="hero-text">
      <div class="language-badges">
        <span class="lang-badge eng">🇺🇸 英语</span>
        <span class="lang-badge jpn">🇯🇵 日语</span>
        <span class="lang-badge kr">🇰🇷 韩语</span>
      </div>
      <h1>沉浸式<br><span>多语种学习</span>体验</h1>
      <p>从零基础到精通，AI驱动的个性化学习路径，让语言学习变得有趣又高效。</p>
      <div style="display: flex; gap: 16px;">
        <button class="btn-primary" onclick="showRegister()">免费开始学习</button>
        <button class="btn-secondary" onclick="navigateTo('dashboard')">浏览课程</button>
      </div>
      
      <div class="hero-features">
        <div class="feature-card">
          <div class="icon">🎯</div>
          <h3>分级课程</h3>
          <p>从入门到精通的完整学习体系</p>
        </div>
        <div class="feature-card">
          <div class="icon">💬</div>
          <h3>互动练习</h3>
          <p>单词记忆、口语跟读、听力训练</p>
        </div>
        <div class="feature-card">
          <div class="icon">🏆</div>
          <h3>成就系统</h3>
          <p>激励学习，见证成长</p>
        </div>
      </div>
    </div>
    
    <div style="position: relative;">
      <div class="glass-card" style="padding: 30px;">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
          <div style="width: 60px; height: 60px; border-radius: 16px; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; font-size: 28px;">📚</div>
          <div>
            <h3 style="font-size: 18px; font-weight: 600;">今日学习目标</h3>
            <p style="color: rgba(255,255,255,0.5); font-size: 13px;">完成 30 分钟学习</p>
          </div>
        </div>
        <div style="margin-bottom: 20px;">
          <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
            <span style="color: rgba(255,255,255,0.6);">学习进度</span>
            <span>24/30 分钟</span>
          </div>
          <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
            <div style="height: 100%; width: 80%; background: var(--primary-gradient); border-radius: 4px;"></div>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px;">
          <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px;">
            <p style="font-size: 12px; color: rgba(255,255,255,0.5);">今日单词</p>
            <p style="font-size: 24px; font-weight: 700;">+15</p>
          </div>
          <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px;">
            <p style="font-size: 12px; color: rgba(255,255,255,0.5);">连续天数</p>
            <p style="font-size: 24px; font-weight: 700;">7</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="auth-modal" id="login-modal">
  <div class="auth-box">
    <button class="close-btn" onclick="hideLogin()">✕</button>
    <h2>欢迎回来</h2>
    <p>登录您的账号继续学习</p>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="handleLogin()">登录</button>
    <div class="auth-toggle">
      还没有账号？<a href="#" onclick="toggleAuth()">立即注册</a>
    </div>
  </div>
</div>

<div class="auth-modal" id="register-modal">
  <div class="auth-box">
    <button class="close-btn" onclick="hideRegister()">✕</button>
    <h2>创建账号</h2>
    <p>开启您的语言学习之旅</p>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" placeholder="输入用户名">
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" placeholder="设置密码">
    </div>
    <button class="btn-primary" onclick="handleRegister()">注册</button>
    <div class="auth-toggle">
      已有账号？<a href="#" onclick="toggleAuth()">立即登录</a>
    </div>
  </div>
</div>

<script>
function showLogin() { document.getElementById('login-modal').classList.add('show'); }
function hideLogin() { document.getElementById('login-modal').classList.remove('show'); }
function showRegister() { document.getElementById('register-modal').classList.add('show'); }
function hideRegister() { document.getElementById('register-modal').classList.remove('show'); }

function toggleAuth() {
  hideLogin();
  hideRegister();
}

function handleLogin() {
  localStorage.setItem('user', JSON.stringify({ name: '学习者', email: 'learner@example.com' }));
  hideLogin();
  navigateTo('dashboard');
}

function handleRegister() {
  localStorage.setItem('user', JSON.stringify({ name: '学习者', email: 'learner@example.com', joined: new Date().toISOString() }));
  hideRegister();
  navigateTo('dashboard');
}

function navigateTo(page) {
  window.location.href = page + '.html';
}
</script>
</body>
</html>
