<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互动练习 - Polyglot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --bg-dark: #0f0f1a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  min-height: 100vh;
  padding-left: 280px;
}

.bg-gradient {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 40% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(118, 75, 162, 0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 280px;
  background: rgba(20, 20, 35, 0.95);
  border-right: 1px solid rgba(255, 255, 255, 0.06);
  padding: 30px;
  display: flex;
  flex-direction: column;
  z-index: 100;
}
.logo {
  font-size: 24px;
  font-weight: 800;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 40px;
}
.sidebar-nav { flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  margin-bottom: 8px;
  border-radius: 12px;
  color: rgba(255, 255, 255, 0.7);
  cursor: pointer;
  transition: all 0.3s;
}
.nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
.nav-item.active {
  background: rgba(102, 126, 234, 0.15);
  color: white;
  border-left: 3px solid #667eea;
}
.nav-item .icon { font-size: 20px; }
.nav-item .label { font-weight: 500; }

.user-section {
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;
}
.user-avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--primary-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

#main-content {
  padding: 40px;
  position: relative;
  z-index: 1;
}

.page-header { margin-bottom: 30px; }
.page-title { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
.page-subtitle { color: rgba(255, 255, 255, 0.6); font-size: 15px; }

.mode-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}
.mode-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 20px;
  padding: 28px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
}
.mode-card:hover {
  border-color: rgba(102, 126, 234, 0.3);
  transform: translateY(-4px);
}
.mode-card.active {
  border-color: rgba(102, 126, 234, 0.5);
  background: rgba(102, 126, 234, 0.1);
}
.mode-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.mode-icon.words { background: linear-gradient(135deg, rgba(66,133,244,0.2), rgba(66,133,244,0.4)); }
.mode-icon.grammar { background: linear-gradient(135deg, rgba(156,39,176,0.2), rgba(156,39,176,0.4)); }
.mode-icon.speaking { background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(76,175,80,0.4)); }
.mode-icon.listening { background: linear-gradient(135deg, rgba(255,152,0,0.2), rgba(255,152,0,0.4)); }
.mode-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.mode-desc { font-size: 13px; color: rgba(255, 255, 255, 0.5); }

.learning-container {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 20px;
  padding: 40px;
  min-height: 500px;
}

.progress-bar {
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 30px;
}
.progress-fill {
  height: 100%;
  background: var(--primary-gradient);
  border-radius: 4px;
  transition: width 0.5s ease;
  width: 40%;
}

.question-area {
  text-align: center;
  margin-bottom: 40px;
}
.question-word {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 12px;
}
.question-hint {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.5);
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 600px;
  margin: 0 auto 30px;
}
.option-btn {
  padding: 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  color: white;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.option-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(102, 126, 234, 0.3);
}
.option-btn.selected {
  background: rgba(102, 126, 234, 0.2);
  border-color: #667eea;
}
.option-btn.correct {
  background: rgba(76, 175, 80, 0.2);
  border-color: #4caf50;
}
.option-btn.wrong {
  background: rgba(244, 67, 54, 0.2);
  border-color: #f44336;
}

.action-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
}
.action-btn {
  padding: 14px 32px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
}
.action-btn.primary {
  background: var(--primary-gradient);
  color: white;
}
.action-btn.primary:hover { transform: translateY(-2px); }
.action-btn.secondary {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.action-btn.secondary:hover { background: rgba(255, 255, 255, 0.15); }

.speaking-area {
  text-align: center;
}
.speaking-text {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 30px;
}
.mic-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--primary-gradient);
  border: none;
  color: white;
  font-size: 40px;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 20px;
}
.mic-btn:hover { transform: scale(1.05); }
.mic-btn.recording {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
  70% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
  100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
}
.score-display {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.6);
}
.score-display.good { color: #4caf50; }
.score-display.bad { color: #f44336; }

.listening-area {
  text-align: center;
}
.audio-btn {
  padding: 16px 40px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 50px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 30px;
}
.audio-btn:hover { background: rgba(255, 255, 255, 0.15); }

.grammar-sentence {
  font-size: 24px;
  margin-bottom: 30px;
  text-align: center;
}
.grammar-blank {
  display: inline-block;
  min-width: 100px;
  padding: 8px 16px;
  border-bottom: 3px dashed rgba(102, 126, 234, 0.5);
  margin: 0 8px;
  color: rgba(255, 255, 255, 0.6);
}

.result-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
}
.result-modal.show { display: flex; }
.result-content {
  background: rgba(20, 20, 35, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  max-width: 450px;
  width: 90%;
}
.result-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--primary-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 20px;
}
.result-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.result-score {
  font-size: 48px;
  font-weight: 800;
  color: #4caf50;
  margin: 20px 0;
}
.result-stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 30px;
}
.result-stat {
  text-align: center;
}
.result-stat .num { font-size: 20px; font-weight: 700; }
.result-stat .label { font-size: 12px; color: rgba(255,255,255,0.5); }

@media (max-width: 1200px) {
  .mode-cards { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  body { padding-left: 0; }
  #sidebar { display: none; }
  .mode-cards { grid-template-columns: 1fr; }
  .options-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>

<aside id="sidebar">
  <div class="logo">Polyglot</div>
  <nav class="sidebar-nav">
    <div class="nav-item" onclick="navigateTo('dashboard')">
      <span class="icon">📊</span>
      <span class="label">学习仪表盘</span>
    </div>
    <div class="nav-item" onclick="navigateTo('courses')">
      <span class="icon">📚</span>
      <span class="label">课程体系</span>
    </div>
    <div class="nav-item active" onclick="navigateTo('learn')">
      <span class="icon">✏️</span>
      <span class="label">互动练习</span>
    </div>
    <div class="nav-item" onclick="navigateTo('community')">
      <span class="icon">👥</span>
      <span class="label">学习社区</span>
    </div>
    <div class="nav-item" onclick="navigateTo('achievements')">
      <span class="icon">🏆</span>
      <span class="label">成就中心</span>
    </div>
  </nav>
  <div class="user-section">
    <div class="user-info">
      <div class="user-avatar">👤</div>
      <div>
        <div style="font-weight: 600; font-size: 14px;">学习者</div>
        <div style="font-size: 12px; color: rgba(255,255,255,0.5);">Lv.8 初级学者</div>
      </div>
    </div>
  </div>
</aside>

<main id="main-content">
  <header class="page-header">
    <h1 class="page-title">互动练习</h1>
    <p class="page-subtitle">选择练习模式，开始今日学习</p>
  </header>

  <div class="mode-cards">
    <div class="mode-card active" onclick="selectMode('words')">
      <div class="mode-icon words">📝</div>
      <div class="mode-title">单词记忆</div>
      <div class="mode-desc">高效记忆单词，巩固词汇基础</div>
    </div>
    <div class="mode-card" onclick="selectMode('grammar')">
      <div class="mode-icon grammar">📚</div>
      <div class="mode-title">语法练习</div>
      <div class="mode-desc">掌握语法规则，提升表达准确性</div>
    </div>
    <div class="mode-card" onclick="selectMode('speaking')">
      <div class="mode-icon speaking">🎤</div>
      <div class="mode-title">口语跟读</div>
      <div class="mode-desc">提升口语表达和发音能力</div>
    </div>
    <div class="mode-card" onclick="selectMode('listening')">
      <div class="mode-icon listening">🎧</div>
      <div class="mode-title">听力训练</div>
      <div class="mode-desc">强化听力理解能力</div>
    </div>
  </div>

  <div class="learning-container">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div id="words-mode" class="mode-content">
      <div class="question-area">
        <div class="question-word">apple</div>
        <div class="question-hint">选择正确的中文意思</div>
      </div>
      <div class="options-grid">
        <button class="option-btn" onclick="selectOption(this)">香蕉</button>
        <button class="option-btn" onclick="selectOption(this)">苹果</button>
        <button class="option-btn" onclick="selectOption(this)">橙子</button>
        <button class="option-btn" onclick="selectOption(this)">葡萄</button>
      </div>
      <div class="action-buttons">
        <button class="action-btn secondary">提示</button>
        <button class="action-btn primary">确认答案</button>
      </div>
    </div>

    <div id="grammar-mode" class="mode-content" style="display: none;">
      <div class="question-area">
        <div class="grammar-sentence">
          I ____ to school every day.
        </div>
        <div class="question-hint">选择正确的动词形式</div>
      </div>
      <div class="options-grid">
        <button class="option-btn" onclick="selectOption(this)">go</button>
        <button class="option-btn" onclick="selectOption(this)">goes</button>
        <button class="option-btn" onclick="selectOption(this)">going</button>
        <button class="option-btn" onclick="selectOption(this)">went</button>
      </div>
      <div class="action-buttons">
        <button class="action-btn secondary">提示</button>
        <button class="action-btn primary">确认答案</button>
      </div>
    </div>

    <div id="speaking-mode" class="mode-content" style="display: none;">
      <div class="speaking-area">
        <div class="speaking-text">Hello, how are you?</div>
        <button class="mic-btn" onclick="toggleRecording(this)">🎤</button>
        <div class="score-display">点击麦克风开始录音</div>
      </div>
      <div class="action-buttons">
        <button class="action-btn secondary">跳过</button>
        <button class="action-btn primary">下一题</button>
      </div>
    </div>

    <div id="listening-mode" class="mode-content" style="display: none;">
      <div class="listening-area">
        <button class="audio-btn">▶ 播放音频</button>
        <div class="question-hint" style="font-size: 18px; margin-bottom: 30px;">请听音频并选择正确答案</div>
        <div class="options-grid">
          <button class="option-btn" onclick="selectOption(this)">He likes coffee.</button>
          <button class="option-btn" onclick="selectOption(this)">She likes tea.</button>
          <button class="option-btn" onclick="selectOption(this)">He likes tea.</button>
          <button class="option-btn" onclick="selectOption(this)">She likes coffee.</button>
        </div>
      </div>
      <div class="action-buttons">
        <button class="action-btn secondary">重播</button>
        <button class="action-btn primary">确认答案</button>
      </div>
    </div>
  </div>
</main>

<div class="result-modal" id="result-modal">
  <div class="result-content">
    <div class="result-icon">🎉</div>
    <div class="result-title">练习完成！</div>
    <div class="result-score">85分</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="num">17/20</div>
        <div class="label">正确题数</div>
      </div>
      <div class="result-stat">
        <div class="num">85%</div>
        <div class="label">正确率</div>
      </div>
      <div class="result-stat">
        <div class="num">12分钟</div>
        <div class="label">用时</div>
      </div>
    </div>
    <button class="action-btn primary" style="width: 100%;" onclick="closeResult()">完成</button>
  </div>
</div>

<script>
function navigateTo(page) {
  window.location.href = page + '.html';
}

function selectMode(mode) {
  const cards = document.querySelectorAll('.mode-card');
  cards.forEach(card => card.classList.remove('active'));
  event.target.classList.add('active');
  
  const contents = document.querySelectorAll('.mode-content');
  contents.forEach(content => content.style.display = 'none');
  document.getElementById(mode + '-mode').style.display = 'block';
}

function selectOption(el) {
  const options = document.querySelectorAll('.option-btn');
  options.forEach(opt => opt.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleRecording(el) {
  el.classList.toggle('recording');
  const score = document.querySelector('.score-display');
  if (el.classList.contains('recording')) {
    score.textContent = '正在录音...';
    setTimeout(() => {
      el.classList.remove('recording');
      score.textContent = '发音准确！得分：92';
      score.classList.add('good');
    }, 3000);
  }
}

function closeResult() {
  document.getElementById('result-modal').classList.remove('show');
}

function showResult() {
  document.getElementById('result-modal').classList.add('show');
}

setTimeout(showResult, 5000);
</script>
</body>
</html>
